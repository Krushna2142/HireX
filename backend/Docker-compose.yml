version: '3.8'
services:
postgres:
image: postgres:15
environment:
POSTGRES_USER: postgres
POSTGRES_PASSWORD: postgres
POSTGRES_DB: jobcrawler
volumes:
- pgdata:/var/lib/postgresql/data
ports:
- '5432:5432'


redis:
image: redis:7-alpine
ports:
- '6379:6379'


minio:
image: minio/minio:latest
environment:
MINIO_ROOT_USER: minioadmin
MINIO_ROOT_PASSWORD: minioadmin
command: server /data
ports:
- '9000:9000'


ts-api:
build: ./ts-api
depends_on:
- postgres
- redis
- minio
- py-ml
environment:
- DATABASE_URL=postgresql://postgres:postgres@postgres:5432/jobcrawler
- REDIS_URL=redis://redis:6379
- MINIO_ENDPOINT=minio:9000
- MINIO_ACCESS_KEY=minioadmin
- MINIO_SECRET_KEY=minioadmin
- ML_SERVICE_URL=http://py-ml:8000
ports:
- '4000:4000'


py-ml:
build: ./py-ml
depends_on:
- redis
environment:
- REDIS_URL=redis://redis:6379
ports:
- '8000:8000'


volumes:
pgdata: