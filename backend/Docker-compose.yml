version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Krushna@123
      POSTGRES_DB: JobCrawlerDB
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data
    ports:
      - '9000:9000'

  python-api:
    build: ./python-api
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - '8000:8000'
    volumes:
      - ./python-api:/app  # For dev hot-reload

volumes:
  pgdata: