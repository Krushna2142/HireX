services:
  node:
    build:
      context: ./backend/node
      dockerfile: Dockerfile
    environment:
      NODE_PORT: 4000
      PY_URL: http://python:8000
    ports:
      - "4000:4000"
    depends_on:
      - python

  python:
    build:
      context: ./backend/python
      dockerfile: Dockerfile
    environment:
      PORT: 8000
      PG_DSN: postgresql://postgres:postgres@db:5432/jobcrawler
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobcrawler
    ports:
      - "5432:5432"