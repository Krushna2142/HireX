# render.yaml — Render deployment config for the Python NLP service

services:
  - type: web
    name: job-crawler-nlp
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter          # 512MB RAM — sufficient for en_core_web_sm
    envVars:
      - key: PYTHON_ENV
        value: production
      - key: PYTHON_NLP_API_KEY
        generateValue: true  # Render auto-generates — copy to NestJS PYTHON_NLP_API_KEY
    healthCheckPath: /health
    autoDeploy: true